<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claws & Code | Architect Console</title>
    <style>
        :root {
            /* Distinct, industrial-cybernetic theme for Claws & Code */
            --bg-deep: #050505;
            --bg-surface: #111111;
            --bg-surface-elevated: #1a1a1a;
            --border-subtle: #222;
            --border-focus: #444;
            --text-primary: #ededed;
            --text-secondary: #888;
            --claw-accent: #00e5ff; /* Cyan for the Orchestrator */
            --worker-accent: #ff6d00; /* Orange for Workers */
            --success: #00e676;
            --error: #ff1744;
            --font-main: 'Geist', 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Architect Command Bar (Top) */
        .architect-bar {
            padding: 16px 24px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 10;
        }

        .brand {
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        .brand .claw { color: var(--claw-accent); }
        .brand .code { color: var(--worker-accent); }

        .objective-input {
            flex: 1;
            display: flex;
            background: var(--bg-deep);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            transition: border-color 0.2s;
        }
        .objective-input:focus-within { border-color: var(--claw-accent); }
        
        .objective-input input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            font-family: var(--font-mono);
        }
        
        .btn-launch {
            background: var(--claw-accent);
            color: #000;
            border: none;
            padding: 0 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-launch:hover { opacity: 0.8; }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left: Orchestrator Context (Claw) */
        .orchestrator-panel {
            width: 380px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .claw-thoughts {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-family: var(--font-mono);
            font-size: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .thought-line { color: var(--claw-accent); line-height: 1.5; }
        .thought-line::before { content: "» "; opacity: 0.5; }

        .memory-ledger {
            height: 40%;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
        }
        .memory-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .memory-item {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 8px;
            background: var(--bg-surface);
            border-left: 2px solid var(--border-focus);
            line-height: 1.4;
        }
        .memory-item.highlight { border-left-color: var(--success); color: var(--text-primary); }

        /* Right: Parallel Execution Matrix (Workers) */
        .execution-matrix {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
            position: relative;
        }

        .matrix-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-controls {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .kbd-hint {
            font-family: var(--font-mono);
            background: var(--bg-surface);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid var(--border-subtle);
            font-size: 10px;
        }

        .swimlanes {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* The Swimlane Concept: Visualizing Parallelism */
        .swimlane {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .swimlane.active-focus { border-color: var(--worker-accent); }

        .swimlane-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-surface-elevated);
            border-bottom: 1px solid var(--border-subtle);
            gap: 16px;
            cursor: pointer;
        }
        .swimlane-header:hover { background: #222; }

        .worker-id {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 700;
            color: var(--worker-accent);
            width: 120px;
        }

        .task-desc {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tenacity-ring {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-badge {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 2px;
            letter-spacing: 1px;
        }
        .status-running { background: rgba(255, 109, 0, 0.1); color: var(--worker-accent); }
        .status-reviewing { background: rgba(139, 92, 246, 0.1); color: #c084fc; border: 1px solid rgba(139, 92, 246, 0.3); }
        .status-stuck { background: rgba(239, 68, 68, 0.2); color: var(--error); border: 1px solid var(--error); animation: pulse-red 2s infinite; }
        .status-success { background: rgba(0, 230, 118, 0.1); color: var(--success); }
        .status-error { background: rgba(255, 23, 68, 0.1); color: var(--error); }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .swimlane-body {
            display: none; /* Hidden by default, expanded via Focus Mode */
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 12px;
            background: #0a0a0a;
            color: var(--text-secondary);
            max-height: 200px;
            overflow-y: auto;
            border-bottom: 1px solid var(--border-subtle);
        }
        .swimlane.expanded .swimlane-body { display: block; }
        
        .log-entry { margin-bottom: 4px; }
        .log-entry.action { color: #fff; }

        .swimlane-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            font-size: 11px;
            background: var(--bg-surface);
        }
        
        .btn-intervene {
            background: transparent;
            border: 1px solid var(--border-focus);
            color: var(--text-primary);
            padding: 4px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
        }
        .btn-intervene:hover { border-color: var(--worker-accent); color: var(--worker-accent); }

        /* HUD Overlay for status */
        .hud-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-mono);
            color: var(--border-focus);
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="architect-bar">
        <div class="brand">
            <span class="claw">Claw</span>
            <span class="code">Code</span>
        </div>
        <div class="objective-input">
            <input type="text" id="objective-input" placeholder="Define the high-level objective for the Orchestrator..." value="Here is the local IP and username/password of my DGX Spark. Log in, set up ssh keys, set up vLLM...">
            <button class="btn-launch" id="btn-deploy" onclick="deployClaw()">Execute</button>
            <button class="btn-launch" style="padding: 0 16px; background: var(--bg-surface-elevated); color: var(--text-primary); border-left: 1px solid var(--border-subtle);" onclick="openSettings()">⚙️</button>
        </div>
    </div>

    <div class="workspace">
        <!-- Settings Modal (BYOK) -->
        <div id="settings-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center;">
            <div style="background:var(--bg-surface); padding:24px; border:1px solid var(--border-subtle); border-radius:8px; width:400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
                <h3 style="margin-bottom:16px; font-weight:600; letter-spacing:1px;">Settings</h3>
                <label style="display:block; margin-bottom:8px; font-size:12px; color:var(--text-secondary); text-transform:uppercase;">LLM API Key (BYOK)</label>
                <input type="password" id="api-key-input" placeholder="sk-..." style="width:100%; background:var(--bg-deep); border:1px solid var(--border-subtle); color:var(--text-primary); padding:10px; margin-bottom:24px; font-family:var(--font-mono); border-radius:4px; outline:none;">
                <div style="display:flex; justify-content:flex-end; gap:12px;">
                    <button onclick="closeSettings()" style="background:transparent; border:1px solid var(--border-focus); color:var(--text-primary); padding:8px 16px; cursor:pointer; border-radius:4px; font-family:var(--font-main);">Cancel</button>
                    <button onclick="saveSettings()" style="background:var(--claw-accent); color:#000; border:none; padding:8px 16px; font-weight:700; cursor:pointer; border-radius:4px; font-family:var(--font-main);">Save Key</button>
                </div>
            </div>
        </div>

        <!-- Orchestrator Context -->
        <div class="orchestrator-panel">
            <div class="panel-header">
                <span>Orchestrator Logic</span>
                <span style="color: var(--claw-accent)">CLAW-01</span>
            </div>
            <div class="claw-thoughts" id="claw-thoughts">
                <div style="color: var(--text-secondary); opacity: 0.5;">Awaiting objective...</div>
            </div>

            <div class="memory-ledger">
                <div class="panel-header" style="border-top: 1px solid var(--border-subtle)">
                    <span>Shared Memory Ledger</span>
                    <span class="kbd-hint">Auto-Sync</span>
                </div>
                <div class="memory-list" id="memory-feed">
                    <div style="color: var(--text-secondary); opacity: 0.5; font-size: 12px; text-align: center; margin-top: 20px;">Ledger is empty.</div>
                </div>
            </div>
        </div>

        <!-- Parallel Execution Matrix -->
        <div class="execution-matrix">
            <div class="matrix-header">
                <span style="font-size: 12px; font-weight: 700; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase;">Parallel Code Instances</span>
                <div class="view-controls">
                    <span>Toggle Logs: <kbd class="kbd-hint">Space</kbd></span>
                    <span>Navigate: <kbd class="kbd-hint">↑</kbd> <kbd class="kbd-hint">↓</kbd></span>
                </div>
            </div>
            
            <div class="hud-overlay" id="hud-status">STANDBY</div>

            <div class="swimlanes" id="worker-matrix">
                <!-- Swimlanes injected here -->
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket("ws://" + window.location.host + "/ws/events");
        const workerMatrix = document.getElementById("worker-matrix");
        const clawThoughts = document.getElementById("claw-thoughts");
        const memoryFeed = document.getElementById("memory-feed");
        const hudStatus = document.getElementById("hud-status");
        
        let workers = {};
        let focusedWorkerId = null;

        // --- Core Inspiration Applied: Keyboard-driven Focus Mode ---
        // Instead of a global "thinking" toggle, we allow the Architect to 
        // focus on specific parallel streams without losing the big picture.
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;

            const workerIds = Object.keys(workers);
            if (workerIds.length === 0) return;

            let currentIndex = workerIds.indexOf(focusedWorkerId);

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentIndex = currentIndex < workerIds.length - 1 ? currentIndex + 1 : 0;
                setFocus(workerIds[currentIndex]);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentIndex = currentIndex > 0 ? currentIndex - 1 : workerIds.length - 1;
                setFocus(workerIds[currentIndex]);
            } else if (e.key === ' ' && focusedWorkerId) { // Spacebar to expand logs
                e.preventDefault();
                toggleExpand(focusedWorkerId);
            }
        });

        function setFocus(id) {
            if (focusedWorkerId) {
                workers[focusedWorkerId].element.classList.remove('active-focus');
            }
            focusedWorkerId = id;
            if (id && workers[id]) {
                workers[id].element.classList.add('active-focus');
                workers[id].element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function toggleExpand(id) {
            if (workers[id]) {
                workers[id].element.classList.toggle('expanded');
            }
        }

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            handleEvent(msg.type, msg.data);
        };

        function handleEvent(type, data) {
            if (type === "objective_start") {
                hudStatus.style.display = 'none';
                clawThoughts.innerHTML = '';
                workerMatrix.innerHTML = '';
                workers = {};
                focusedWorkerId = null;
            }
            else if (type === "claw_update") {
                const log = document.createElement("div");
                log.className = "thought-line";
                log.innerText = data.log;
                clawThoughts.appendChild(log);
                clawThoughts.scrollTop = clawThoughts.scrollHeight;
            }
            else if (type === "task_tree") {
                data.tasks.forEach((task, index) => {
                    createSwimlane(task);
                    if (index === 0) setFocus(task.id); // Auto-focus first
                });
            }
            else if (type === "worker_update") {
                updateSwimlane(data);
            }
            else if (type === "memory_update") {
                renderMemory(data.memory);
            }
            else if (type === "orchestration_complete") {
                hudStatus.style.display = 'block';
                hudStatus.innerText = data.status === 'success' ? "MISSION ACCOMPLISHED" : "SYSTEM HALT";
                hudStatus.style.color = data.status === 'success' ? 'var(--success)' : 'var(--error)';
            }
        }

        function createSwimlane(task) {
            const lane = document.createElement("div");
            lane.className = "swimlane";
            lane.id = `lane-${task.id}`;
            
            lane.innerHTML = `
                <div class="swimlane-header" onclick="setFocus('${task.id}'); toggleExpand('${task.id}')">
                    <div class="worker-id">WRK::${task.id.substring(0,8).toUpperCase()}</div>
                    <div class="task-desc">${task.desc}</div>
                    <div class="tenacity-ring">
                        <span id="loop-${task.id}">L:0</span>
                    </div>
                    <div class="status-badge status-running" id="status-${task.id}">INIT</div>
                </div>
                <div class="swimlane-body" id="body-${task.id}">
                    <div class="log-entry">Initializing environment sequence...</div>
                </div>
                <div class="swimlane-footer">
                    <span style="color: var(--text-secondary)">Last active: just now</span>
                    <button class="btn-intervene" onclick="alert('Architect intervention for ${task.id}')">Inject Context</button>
                </div>
            `;
            workerMatrix.appendChild(lane);
            workers[task.id] = { element: lane, logContainer: lane.querySelector(`#body-${task.id}`) };
        }

        function updateSwimlane(data) {
            let targetId = data.task_id;
            const isReviewer = targetId.startsWith('Reviewer-');
            if (isReviewer) {
                targetId = targetId.replace('Reviewer-', '');
            }

            if (!workers[targetId]) return;
            
            const w = workers[targetId];
            const statusEl = document.getElementById(`status-${targetId}`);
            const loopEl = document.getElementById(`loop-${targetId}`);

            // Update Header
            statusEl.innerText = isReviewer ? `REVIEW: ${data.status}` : data.status;
            if (data.loop) {
                loopEl.innerText = `L:${data.loop.split('/')[0]}`;
            }

            statusEl.className = "status-badge";
            if (data.status === "Success") statusEl.classList.add("status-success");
            else if (data.status === "Failed") statusEl.classList.add("status-error");
            else if (data.status === "Reviewing") statusEl.classList.add("status-reviewing");
            else if (data.status === "Stuck") statusEl.classList.add("status-stuck");
            else statusEl.classList.add("status-running");

            // Append to internal log
            const logEntry = document.createElement('div');
            const prefix = isReviewer ? "[REVIEW] " : "";
            logEntry.className = `log-entry ${data.status === 'Acting' ? 'action' : ''}`;
            logEntry.innerText = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${prefix}${data.status.padEnd(10)} | ${data.log}`;
            w.logContainer.appendChild(logEntry);
            w.logContainer.scrollTop = w.logContainer.scrollHeight;
        }

        function renderMemory(memoryArray) {
            memoryFeed.innerHTML = '';
            [...memoryArray].reverse().slice(0, 20).forEach(note => {
                const el = document.createElement("div");
                const importance = note.importance || 1;
                el.className = `memory-item ${note.tags.includes('success') ? 'highlight' : ''}`;
                
                if (importance >= 4) {
                    el.style.borderLeftWidth = '4px';
                    el.style.background = 'rgba(239, 68, 68, 0.05)';
                    if (importance === 5) el.style.borderLeftColor = 'var(--error)';
                }

                el.innerHTML = `
                    <div style="font-family: var(--font-mono); font-size: 10px; margin-bottom: 4px; opacity: 0.7; display: flex; justify-content: space-between;">
                        <span>SRC: ${note.agent_id}</span>
                        <span>IMP: ${importance}</span>
                    </div>
                    <div>${note.note}</div>
                `;
                memoryFeed.appendChild(el);
            });
        }

        // --- Settings / BYOK Logic ---
        function openSettings() {
            document.getElementById('api-key-input').value = localStorage.getItem('llm_api_key') || '';
            document.getElementById('settings-modal').style.display = 'flex';
        }
        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }
        function saveSettings() {
            localStorage.setItem('llm_api_key', document.getElementById('api-key-input').value);
            closeSettings();
        }

        async function deployClaw() {
            const objective = document.getElementById("objective-input").value;
            const apiKey = localStorage.getItem('llm_api_key');
            
            if (!apiKey) {
                alert("Please configure your API Key in Settings (⚙️) first.");
                openSettings();
                return;
            }

            const btn = document.getElementById("btn-deploy");
            btn.disabled = true;
            btn.innerText = "RUNNING";
            
            try {
                const response = await fetch("/api/orchestrate", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({ objective })
                });

                if (!response.ok) {
                    let errDetail = "Failed to start orchestration";
                    try {
                        const errData = await response.json();
                        errDetail = errData.detail || errDetail;
                    } catch(e) {}
                    alert(`Error: ${errDetail}`);
                }
            } catch (err) {
                alert(`Connection Error: ${err.message}`);
            }

            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = "EXECUTE";
            }, 2000);
        }
    </script>
</body>
</html>
